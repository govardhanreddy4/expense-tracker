<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="apple-touch-icon" href="/icon-192.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker - Glassmorphism</title>
</head>

<body class="transition-colors duration-500">
  <div id="app" class="flex h-screen overflow-hidden">
    <!-- Auth Container -->
    <div id="auth-container" class="absolute inset-0 z-50 flex items-center justify-center p-4">
      <!-- Login/Signup cards will be injected here -->
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="hidden md:flex flex-col w-64 glass m-4 mr-0 z-20">
      <div class="p-6">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-purple-500">Expensify</h1>
      </div>

  <nav class="flex-1 px-4 space-y-2">
    <a href="#" data-page="dashboard"
      class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/20 dark:hover:bg-black/20 font-medium">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
        </path>
      </svg>
      Dashboard
    </a>
    <a href="#" data-page="transactions"
      class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/20 dark:hover:bg-black/20 font-medium">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
        </path>
      </svg>
      Transactions
    </a>
    <a href="#" data-page="analytics"
      class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/20 dark:hover:bg-black/20 font-medium">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path>
      </svg>
      Analytics
    </a>
    <a href="#" data-page="profile"
      class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/20 dark:hover:bg-black/20 font-medium">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
      </svg>
      Profile
    </a>

  </nav>

  <div class="p-6">
    <button id="logout-btn"
      class="w-full flex items-center justify-center gap-2 glass-button py-3 text-red-500 hover:text-red-600 dark:text-red-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
      Logout
    </button>
  </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-full overflow-hidden relative">
    <!-- Top Navbar -->
    <header class="h-20 p-4 shrink-0 flex items-center justify-between z-10 w-full max-w-7xl mx-auto">
      <div class="flex items-center gap-4">
        <button id="mobile-menu-btn" class="md:hidden glass-button p-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
        <h2 id="page-title" class="text-2xl font-bold ml-2 md:ml-6">Dashboard</h2>
      </div>

      <div class="flex items-center gap-4">
        <div class="hidden sm:flex items-center gap-2 glass px-4 py-2">
          <span class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center">
            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
          </span>
          <span id="user-greeting" class="font-medium text-sm">Hello, User</span>
        </div>
        <button id="theme-toggle" class="glass-button p-3 rounded-full">
          <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
            </path>
          </svg>
          <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Scrollable Content Area -->
    <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8 pt-0 w-full max-w-7xl mx-auto custom-scrollbar">
      <!-- Page views injected here -->
    </div>

    <!-- Floating Action Button -->
    <button id="fab-add"
      class="absolute bottom-8 right-8 w-14 h-14 bg-gradient-to-r from-primary to-purple-500 rounded-full flex items-center justify-center text-white shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 z-30">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
      </svg>
    </button>
  </main>

  <!-- Mobile Sidebar Overlay -->
  <div id="mobile-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden transition-opacity opacity-0">
  </div>
  </div>

  <!-- Modal Container -->
  <div id="modal-container" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
    <div id="modal-backdrop" class="absolute inset-0 bg-black/40 backdrop-blur-md opacity-0 transition-opacity"></div>
    <div id="modal-content" class="relative z-10 w-full max-w-md scale-95 opacity-0 transition-all duration-300">
      <!-- Modals injected here -->
    </div>
  </div>

  <!-- Notification Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[70] flex flex-col gap-2"></div>

  <script type="module" src="/src/main.js" onerror="console.error('Failed to load main.js')"></script>
</body>

</html>
